document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ities) -->\n          <div style=\"position:absolute; left:8%; top:40%; width:22%; aspect-ratio:1/3.4; transform:rotate(8deg); border-radius:40%; background:radial-gradient(circle at 50% 40%, #d98a3a 0%, rgba(91,192,206,.4) 55%, rgba(14,23,38,0) 90%); filter:blur(7px); mix-blend-mode:screen; animation:iceBloomSlow 8s ease-in-out infinite;\"><\u002Fdiv>\n          <div style=\"position:absolute; right:8%; top:40%; width:22%; aspect-ratio:1/3.4; transform:rotate(-8deg); border-radius:40%; background:radial-gradient(circle at 50% 40%, #d98a3a 0%, rgba(91,192,206,.4) 55%, rgba(14,23,38,0) 90%); filter:blur(7px); mix-blend-mode:screen; animation:iceBloomSlow 7.4s ease-in-out infinite;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"position:relative; margin-bottom:-26px; font-size:10px; letter-spacing:.18em; color:#6f829a; background:#0E1726; padding:2px 8px; border-radius:3px;\">THERMAL BODY · replace<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- scale-bar motif -->\n      <div aria-hidden=\"true\" style=\"position:absolute; right:-2%; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; align-items:center; gap:4px;\">\n        <span style=\"font-size:8px; color:#9fb2c7;\">37°<\u002Fspan>\n        <div style=\"width:7px; height:120px; border-radius:4px; background:linear-gradient(#F4B41A,#E2711D,#D7263D 55%,#7c2a48 80%,#3E8E9E);\"><\u002Fdiv>\n        <span style=\"font-size:8px; color:#9fb2c7;\">31°<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CTA + scroll cue -->\n    <div style=\"position:relative; display:flex; flex-direction:column; align-items:center; gap:26px; margin-top:18px;\">\n      <a href=\"#intro\" style=\"display:inline-flex; align-items:center; gap:10px; text-decoration:none; font-weight:600; font-size:16px; letter-spacing:.02em; color:#0E1726; background:linear-gradient(95deg,#F4B41A,#E2711D 60%,#D7263D); padding:14px 26px; border-radius:999px; box-shadow:0 10px 30px rgba(226,113,29,.4);\" style-hover=\"box-shadow:0 14px 40px rgba(215,38,61,.5); transform:translateY(-2px);\">\n      Enter the lab <span aria-hidden=\"true\" style=\"display:inline-block; animation:iceArrow 1.6s ease-in-out infinite;\">→<\u002Fspan>\n      <\u002Fa>\n      <a href=\"#intro\" aria-label=\"Scroll down\" style=\"display:flex; flex-direction:column; align-items:center; gap:6px; text-decoration:none; color:#9fb2c7;\">\n        <span style=\"font-size:11px; letter-spacing:.28em; text-transform:uppercase;\">Scroll<\u002Fspan>\n        <span aria-hidden=\"true\" style=\"display:inline-block; animation:iceBob 1.8s ease-in-out infinite; font-size:18px;\">↓<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ MISSION (light) ============ -->\n  <section id=\"intro\" style=\"background:#F7F4EC; color:#1A1A1A; padding:clamp(64px,10vw,128px) clamp(18px,5vw,72px);\">\n    <div style=\"max-width:1180px; margin:0 auto; display:flex; gap:clamp(32px,5vw,72px); flex-wrap:wrap; align-items:flex-start;\">\n      <div style=\"flex:1 1 440px; min-width:300px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:22px;\">\n          <span aria-hidden=\"true\" style=\"width:34px; height:7px; border-radius:4px; background:linear-gradient(90deg,#3E8E9E,#F4B41A,#E2711D,#D7263D);\"><\u002Fspan>\n          <span style=\"font-size:12px; letter-spacing:.26em; text-transform:uppercase; color:#94704a; font-weight:600;\">What we do<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Zilla Slab', serif; font-weight:300; font-size:clamp(30px,5vw,52px); line-height:1.06; letter-spacing:-.01em; margin:0 0 28px;\">Energy expenditure isn't a number. It's a <span style=\"font-weight:700; color:#D7263D;\">signal<\u002Fspan> — and it looks different in every body.<\u002Fh2>\n        <p style=\"font-size:clamp(16px,1.5vw,19px); line-height:1.7; max-width:60ch; margin:0 0 18px; color:#33312c;\">Every textbook treats your daily energy expenditure as a number — a single resting metabolic rate, a fixed \"10% of intake\" for digestion, an activity multiplier pulled from a table. But energy expenditure isn't a number. It's a signal that rises and falls across the day with every meal, every movement, every shift in body composition, and it looks different in every person.<\u002Fp>\n        <p style=\"font-size:clamp(16px,1.5vw,19px); line-height:1.7; max-width:60ch; margin:0 0 28px; color:#33312c;\">At the ICE Lab we build personalized, dynamic models of total energy expenditure — resting metabolism, the energy cost of movement, and the hardest piece of all, the thermic effect of food. We pair high-temporal-resolution measurement, including infrared thermal imaging and whole-room calorimetry, with mathematical modeling, so that we can predict not just <em>how much<\u002Fem> energy a person burns, but <em>when<\u002Fem>, and <em>why<\u002Fem>.<\u002Fp>\n        <a href=\"#themes\" style=\"display:inline-flex; align-items:center; gap:8px; text-decoration:none; font-weight:700; font-size:17px; color:#D7263D; border-bottom:2px solid rgba(215,38,61,.3); padding-bottom:3px;\" style-hover=\"border-bottom-color:#D7263D;\">Our research <span aria-hidden=\"true\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n\n      <!-- collage cut-outs -->\n      <div style=\"flex:1 1 300px; min-width:260px; position:relative; min-height:380px;\">\n        <!-- REPLACE: collage cut-out image -->\n        <div style=\"position:absolute; left:4%; top:0; width:64%; aspect-ratio:3/4; transform:rotate(-4deg); background:#fff; border:1px solid #e6ddc8; border-radius:4px; box-shadow:0 18px 34px rgba(26,26,26,.14); padding:10px; overflow:hidden;\">\n          <div aria-hidden=\"true\" style=\"height:100%; border-radius:3px; background:radial-gradient(70% 60% at 50% 40%, #F4B41A, #E2711D 45%, #D7263D 70%, #2a1822 100%);\"><\u002Fdiv>\n          <span style=\"position:absolute; left:14px; bottom:14px; font-size:10px; letter-spacing:.12em; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.4);\">CALORIMETRY ROOM · replace<\u002Fspan>\n        <\u002Fdiv>\n        <!-- REPLACE: collage cut-out image -->\n        <div style=\"position:absolute; right:2%; bottom:2%; width:50%; aspect-ratio:1/1; transform:rotate(6deg); background:#fff; border:1px solid #e6ddc8; border-radius:4px; box-shadow:0 18px 34px rgba(26,26,26,.14); padding:10px; overflow:hidden;\">\n          <div aria-hidden=\"true\" style=\"height:100%; border-radius:3px; background:radial-gradient(65% 65% at 55% 45%, #ffe9a8, #3E8E9E 60%, #16344a 100%);\"><\u002Fdiv>\n          <span style=\"position:absolute; left:14px; bottom:14px; font-size:10px; letter-spacing:.12em; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.4);\">FLIR SCAN · replace<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ MEDIA / FEATURED ============ -->\n  <section id=\"media\" style=\"background:#F1ECE0; color:#1A1A1A; padding:clamp(56px,8vw,104px) clamp(18px,5vw,72px); border-top:1px solid #e2d9c4;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:38px;\">\n        <h2 style=\"font-family:'Zilla Slab', serif; font-weight:300; font-size:clamp(28px,4.4vw,46px); margin:0;\">In <span style=\"font-weight:700;\">the<\u002Fspan> media<\u002Fh2>\n        <span style=\"font-size:13px; letter-spacing:.2em; text-transform:uppercase; color:#94704a; font-weight:600;\">Featured &amp; coverage<\u002Fspan>\n      <\u002Fdiv>\n      <!-- REPLACE: drop in real coverage — headline + caption + link -->\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(248px,1fr)); gap:26px;\">\n\n        <a href=\"#\" style=\"text-decoration:none; color:#1A1A1A; background:#fff; border:1px solid #e6ddc8; border-radius:6px; overflow:hidden; box-shadow:0 8px 22px rgba(26,26,26,.08); transition:transform .3s ease, box-shadow .3s ease;\" style-hover=\"transform:rotate(-1deg) translateY(-6px); box-shadow:0 18px 38px rgba(26,26,26,.16);\">\n          <div aria-hidden=\"true\" style=\"aspect-ratio:16/10; background:radial-gradient(60% 70% at 40% 40%, #F4B41A, #E2711D 50%, #D7263D 85%);\"><\u002Fdiv>\n          <div style=\"padding:18px 18px 22px;\">\n            <span style=\"font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#94704a; font-weight:600;\">Publication<\u002Fspan>\n            <h3 style=\"font-family:'Zilla Slab', serif; font-weight:600; font-size:20px; line-height:1.2; margin:8px 0 8px;\">Dynamic models of total energy expenditure<\u002Fh3>\n            <p style=\"font-size:14px; line-height:1.55; color:#5a554c; margin:0 0 12px;\">Flagship paper on time-resolved TEE — replace with citation.<\u002Fp>\n            <span style=\"font-size:13px; font-weight:700; color:#D7263D;\">Read →<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#\" style=\"text-decoration:none; color:#1A1A1A; background:#fff; border:1px solid #e6ddc8; border-radius:6px; overflow:hidden; box-shadow:0 8px 22px rgba(26,26,26,.08); transition:transform .3s ease, box-shadow .3s ease;\" style-hover=\"transform:rotate(1deg) translateY(-6px); box-shadow:0 18px 38px rgba(26,26,26,.16);\">\n          <div aria-hidden=\"true\" style=\"aspect-ratio:16/10; background:radial-gradient(60% 70% at 55% 45%, #ffe9a8, #E2711D 55%, #7c2a48 90%);\"><\u002Fdiv>\n          <div style=\"padding:18px 18px 22px;\">\n            <span style=\"font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#94704a; font-weight:600;\">Press<\u002Fspan>\n            <h3 style=\"font-family:'Zilla Slab', serif; font-weight:600; font-size:20px; line-height:1.2; margin:8px 0 8px;\">Reading metabolism off the skin<\u002Fh3>\n            <p style=\"font-size:14px; line-height:1.55; color:#5a554c; margin:0 0 12px;\">Coverage of the thermal-imaging method — replace with outlet + link.<\u002Fp>\n            <span style=\"font-size:13px; font-weight:700; color:#D7263D;\">Read →<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#\" style=\"text-decoration:none; color:#1A1A1A; background:#fff; border:1px solid #e6ddc8; border-radius:6px; overflow:hidden; box-shadow:0 8px 22px rgba(26,26,26,.08); transition:transform .3s ease, box-shadow .3s ease;\" style-hover=\"transform:rotate(-1deg) translateY(-6px); box-shadow:0 18px 38px rgba(26,26,26,.16);\">\n          <div aria-hidden=\"true\" style=\"aspect-ratio:16/10; background:radial-gradient(60% 70% at 45% 50%, #ffd98a, #3E8E9E 55%, #16344a 92%);\"><\u002Fdiv>\n          <div style=\"padding:18px 18px 22px;\">\n            <span style=\"font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#94704a; font-weight:600;\">Talk / award<\u002Fspan>\n            <h3 style=\"font-family:'Zilla Slab', serif; font-weight:600; font-size:20px; line-height:1.2; margin:8px 0 8px;\">Keynote on personalized energetics<\u002Fh3>\n            <p style=\"font-size:14px; line-height:1.55; color:#5a554c; margin:0 0 12px;\">Invited talk or recognition — replace with venue + link.<\u002Fp>\n            <span style=\"font-size:13px; font-weight:700; color:#D7263D;\">Watch →<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#\" style=\"text-decoration:none; color:#1A1A1A; background:#fff; border:1px solid #e6ddc8; border-radius:6px; overflow:hidden; box-shadow:0 8px 22px rgba(26,26,26,.08); transition:transform .3s ease, box-shadow .3s ease;\" style-hover=\"transform:rotate(1deg) translateY(-6px); box-shadow:0 18px 38px rgba(26,26,26,.16);\">\n          <div aria-hidden=\"true\" style=\"aspect-ratio:16/10; background:radial-gradient(60% 70% at 50% 42%, #F4B41A, #D7263D 60%, #2a1822 95%);\"><\u002Fdiv>\n          <div style=\"padding:18px 18px 22px;\">\n            <span style=\"font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#94704a; font-weight:600;\">Collaboration<\u002Fspan>\n            <h3 style=\"font-family:'Zilla Slab', serif; font-weight:600; font-size:20px; line-height:1.2; margin:8px 0 8px;\">Calorimetry × machine learning<\u002Fh3>\n            <p style=\"font-size:14px; line-height:1.55; color:#5a554c; margin:0 0 12px;\">Highlight a joint project — replace with partner + link.<\u002Fp>\n            <span style=\"font-size:13px; font-weight:700; color:#D7263D;\">Explore →<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ RESEARCH THEMES (dark thermal baseline) ============ -->\n  <section id=\"themes\" style=\"position:relative; background:#0C1320; color:#F7F4EC; padding:clamp(64px,10vw,128px) clamp(18px,5vw,72px); overflow:hidden;\">\n    <div aria-hidden=\"true\" style=\"position:absolute; inset:0; background-image:repeating-linear-gradient(0deg, rgba(91,192,206,.05) 0px, rgba(91,192,206,.05) 1px, transparent 1px, transparent 4px); pointer-events:none; opacity:.6;\"><\u002Fdiv>\n    <div aria-hidden=\"true\" style=\"position:absolute; inset:0; background:radial-gradient(70% 50% at 80% 12%, rgba(226,113,29,.1), transparent 60%), radial-gradient(60% 50% at 10% 80%, rgba(215,38,61,.1), transparent 60%); pointer-events:none;\"><\u002Fdiv>\n\n    <div style=\"position:relative; max-width:1180px; margin:0 auto;\">\n      <div style=\"text-align:center; margin-bottom:clamp(40px,6vw,72px);\">\n        <div style=\"display:inline-flex; align-items:center; gap:10px; margin-bottom:18px;\">\n          <span aria-hidden=\"true\" style=\"width:34px; height:7px; border-radius:4px; background:linear-gradient(90deg,#3E8E9E,#F4B41A,#E2711D,#D7263D);\"><\u002Fspan>\n          <span style=\"font-size:12px; letter-spacing:.26em; text-transform:uppercase; color:#5BC0CE; font-weight:600;\">The cabinet<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Zilla Slab', serif; font-weight:300; font-size:clamp(30px,5vw,54px); margin:0; line-height:1.05;\">Three glowing <span style=\"font-weight:700; color:#E2711D;\">specimens<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n\n      <!-- THEME 1 -->\n      <div style=\"display:flex; gap:clamp(28px,5vw,64px); align-items:center; flex-wrap:wrap; margin-bottom:clamp(40px,6vw,80px);\">\n        <!-- REPLACE: theme image -->\n        <div style=\"flex:1 1 340px; min-width:280px; aspect-ratio:4/3; position:relative; transform:rotate(-2deg); background:#11203a; border:1px solid rgba(91,192,206,.2); border-radius:6px; box-shadow:0 24px 50px rgba(0,0,0,.5); overflow:hidden;\">\n          <div aria-hidden=\"true\" style=\"position:absolute; inset:0; background:radial-gradient(45% 50% at 38% 55%, rgba(244,180,26,.85), rgba(226,113,29,.5) 40%, rgba(215,38,61,.25) 64%, rgba(12,19,32,0) 82%);\"><\u002Fdiv>\n          <span style=\"position:absolute; left:16px; bottom:14px; font-size:10px; letter-spacing:.14em; color:#9fb2c7;\">EE CURVE · replace<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 340px; min-width:280px;\">\n          <span style=\"font-size:13px; font-family:'Zilla Slab',serif; color:#5BC0CE; font-weight:600;\">01<\u002Fspan>\n          <h3 style=\"font-family:'Zilla Slab', serif; font-weight:600; font-size:clamp(24px,3.2vw,34px); line-height:1.12; margin:6px 0 14px;\">Dynamic Total Energy Expenditure<\u002Fh3>\n          <p style=\"font-size:clamp(15px,1.5vw,18px); line-height:1.7; color:#c3cdda; max-width:54ch; margin:0;\">We model energy expenditure as a continuous, time-resolved signal rather than a daily average — fusing resting, activity, and postprandial components into one personalized curve.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- THEME 2 (reversed) -->\n      <div style=\"display:flex; gap:clamp(28px,5vw,64px); align-items:center; flex-wrap:wrap; flex-direction:row-reverse; margin-bottom:clamp(40px,6vw,80px);\">\n        <!-- REPLACE: theme image -->\n        <div style=\"flex:1 1 340px; min-width:280px; aspect-ratio:4/3; position:relative; transform:rotate(2deg); background:#11203a; border:1px solid rgba(226,113,29,.22); border-radius:6px; box-shadow:0 24px 50px rgba(0,0,0,.5); overflow:hidden;\">\n          <div aria-hidden=\"true\" style=\"position:absolute; inset:0; background:radial-gradient(45% 50% at 62% 45%, rgba(255,233,168,.9), rgba(226,113,29,.55) 42%, rgba(124,42,72,.3) 66%, rgba(12,19,32,0) 84%);\"><\u002Fdiv>\n          <span style=\"position:absolute; left:16px; bottom:14px; font-size:10px; letter-spacing:.14em; color:#9fb2c7;\">TEF RESPONSE · replace<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 340px; min-width:280px;\">\n          <span style=\"font-size:13px; font-family:'Zilla Slab',serif; color:#E2711D; font-weight:600;\">02<\u002Fspan>\n          <h3 style=\"font-family:'Zilla Slab', serif; font-weight:600; font-size:clamp(24px,3.2vw,34px); line-height:1.12; margin:6px 0 14px;\">The Thermic Effect of Food<\u002Fh3>\n          <p style=\"font-size:clamp(15px,1.5vw,18px); line-height:1.7; color:#c3cdda; max-width:54ch; margin:0;\">The thermic effect of food is the least-understood term in the energy budget. We replace the static \"fraction of intake\" assumption with dynamic curves that respond to meal composition, timing, and individual phenotype.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- THEME 3 -->\n      <div style=\"display:flex; gap:clamp(28px,5vw,64px); align-items:center; flex-wrap:wrap;\">\n        <!-- REPLACE: theme image -->\n        <div style=\"flex:1 1 340px; min-width:280px; aspect-ratio:4/3; position:relative; transform:rotate(-2deg); background:#11203a; border:1px solid rgba(91,192,206,.2); border-radius:6px; box-shadow:0 24px 50px rgba(0,0,0,.5); overflow:hidden;\">\n          <div aria-hidden=\"true\" style=\"position:absolute; inset:0; background:radial-gradient(48% 52% at 45% 48%, rgba(244,180,26,.8), rgba(215,38,61,.45) 40%, rgba(62,142,158,.3) 70%, rgba(12,19,32,0) 86%);\"><\u002Fdiv>\n          <span style=\"position:absolute; left:16px; bottom:14px; font-size:10px; letter-spacing:.14em; color:#9fb2c7;\">FLIR THERMOGRAM · replace<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 340px; min-width:280px;\">\n          <span style=\"font-size:13px; font-family:'Zilla Slab',serif; color:#D7263D; font-weight:600;\">03<\u002Fspan>\n          <h3 style=\"font-family:'Zilla Slab', serif; font-weight:600; font-size:clamp(24px,3.2vw,34px); line-height:1.12; margin:6px 0 14px;\">Thermal Imaging of Human Energetics<\u002Fh3>\n          <p style=\"font-size:clamp(15px,1.5vw,18px); line-height:1.7; color:#c3cdda; max-width:54ch; margin:0;\">We use infrared thermography (FLIR) to read heat production directly off the body — turning where and when a person radiates heat into a non-invasive window on metabolic rate.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ MANIFESTO (light, quiet) ============ -->\n  <section id=\"manifesto\" style=\"background:#F7F4EC; color:#1A1A1A; padding:clamp(72px,11vw,150px) clamp(18px,5vw,72px);\">\n    <div style=\"max-width:760px; margin:0 auto; text-align:center;\">\n      <div style=\"display:inline-flex; align-items:center; gap:10px; margin-bottom:26px;\">\n        <span aria-hidden=\"true\" style=\"width:34px; height:7px; border-radius:4px; background:linear-gradient(90deg,#3E8E9E,#F4B41A,#E2711D,#D7263D);\"><\u002Fspan>\n        <span style=\"font-size:12px; letter-spacing:.26em; text-transform:uppercase; color:#94704a; font-weight:600;\">Why this work matters<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Zilla Slab', serif; font-weight:300; font-size:clamp(34px,7vw,76px); line-height:1.02; letter-spacing:-.015em; margin:0 0 40px;\">Metabolism is <span style=\"font-weight:700; color:#D7263D;\">not<\u002Fspan> a number.<\u002Fh2>\n\n      <!-- REPLACE: personal anecdote / manifesto — supply the real moment (2–4 short paragraphs) -->\n      <div style=\"text-align:left; max-width:65ch; margin:0 auto; font-size:clamp(17px,1.7vw,21px); line-height:1.75; color:#33312c;\">\n        <p style=\"margin:0 0 22px;\"><span style=\"opacity:.5;\">[ REPLACE — your manifesto ]<\u002Fspan> There was a moment the single-number model stopped making sense to me — a measurement that refused to sit still, a scan that showed heat where the textbook promised none. Tell that moment here, concretely.<\u002Fp>\n        <p style=\"margin:0 0 22px;\">Say what it revealed: that the same person, measured an hour apart, is metabolically two different people — and that the difference is not noise, it's the signal we've been averaging away.<\u002Fp>\n        <p style=\"margin:0;\">And say why it's worth a career: because a model that breathes with the body, instead of flattening it, is the difference between describing metabolism and actually understanding it.<\u002Fp>\n      <\u002Fdiv>\n\n      <div aria-hidden=\"true\" style=\"display:flex; justify-content:center; margin-top:44px;\">\n        <svg width=\"160\" height=\"26\" viewBox=\"0 0 160 26\" fill=\"none\" role=\"presentation\">\n          <path d=\"M0 13 H44 L52 13 L58 3 L66 23 L74 8 L80 13 H160\" stroke=\"#D7263D\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ NEWS ============ -->\n  <section id=\"news\" style=\"background:#F1ECE0; color:#1A1A1A; padding:clamp(56px,8vw,104px) clamp(18px,5vw,72px); border-top:1px solid #e2d9c4;\">\n    <div style=\"max-width:880px; margin:0 auto;\">\n      <h2 style=\"font-family:'Zilla Slab', serif; font-weight:300; font-size:clamp(28px,4.4vw,46px); margin:0 0 36px;\">Latest <span style=\"font-weight:700;\">news<\u002Fspan><\u002Fh2>\n\n      <!-- REPLACE: real, dated news — YYYY-MM-DD · Headline · one sentence -->\n      <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column;\">\n        <li style=\"display:flex; gap:clamp(16px,3vw,40px); padding:22px 0; border-top:1px solid #ddd2bb; flex-wrap:wrap;\">\n          <time style=\"flex:none; font-family:'Zilla Slab',serif; font-weight:600; font-size:15px; color:#D7263D; letter-spacing:.02em;\">YYYY-MM-DD<\u002Ftime>\n          <div style=\"flex:1 1 320px;\">\n            <a href=\"#\" style=\"text-decoration:none; font-family:'Zilla Slab',serif; font-weight:600; font-size:clamp(18px,2vw,22px); color:#1A1A1A; border-bottom:2px solid transparent;\" style-hover=\"border-bottom-color:#D7263D;\">New preprint on dynamic TEF — replace<\u002Fa>\n            <p style=\"margin:6px 0 0; font-size:15px; line-height:1.55; color:#5a554c;\">One sentence summarising the item. Replace with a real, dated entry.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:flex; gap:clamp(16px,3vw,40px); padding:22px 0; border-top:1px solid #ddd2bb; flex-wrap:wrap;\">\n          <time style=\"flex:none; font-family:'Zilla Slab',serif; font-weight:600; font-size:15px; color:#D7263D; letter-spacing:.02em;\">YYYY-MM-DD<\u002Ftime>\n          <div style=\"flex:1 1 320px;\">\n            <a href=\"#\" style=\"text-decoration:none; font-family:'Zilla Slab',serif; font-weight:600; font-size:clamp(18px,2vw,22px); color:#1A1A1A; border-bottom:2px solid transparent;\" style-hover=\"border-bottom-color:#D7263D;\">A new lab member joins — replace<\u002Fa>\n            <p style=\"margin:6px 0 0; font-size:15px; line-height:1.55; color:#5a554c;\">One sentence summarising the item. Replace with a real, dated entry.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:flex; gap:clamp(16px,3vw,40px); padding:22px 0; border-top:1px solid #ddd2bb; border-bottom:1px solid #ddd2bb; flex-wrap:wrap;\">\n          <time style=\"flex:none; font-family:'Zilla Slab',serif; font-weight:600; font-size:15px; color:#D7263D; letter-spacing:.02em;\">YYYY-MM-DD<\u002Ftime>\n          <div style=\"flex:1 1 320px;\">\n            <a href=\"#\" style=\"text-decoration:none; font-family:'Zilla Slab',serif; font-weight:600; font-size:clamp(18px,2vw,22px); color:#1A1A1A; border-bottom:2px solid transparent;\" style-hover=\"border-bottom-color:#D7263D;\">Conference talk accepted — replace<\u002Fa>\n            <p style=\"margin:6px 0 0; font-size:15px; line-height:1.55; color:#5a554c;\">One sentence summarising the item. Replace with a real, dated entry.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n      <\u002Ful>\n      <a href=\"#\" style=\"display:inline-flex; align-items:center; gap:8px; margin-top:26px; text-decoration:none; font-weight:700; font-size:16px; color:#D7263D;\" style-hover=\"gap:12px;\">See all news <span aria-hidden=\"true\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ JOIN / RECRUITING ============ -->\n  <section id=\"join\" style=\"background:linear-gradient(120deg,#E2711D 0%,#D7263D 60%,#b01f33 100%); color:#fff; padding:clamp(64px,9vw,120px) clamp(18px,5vw,72px); position:relative; overflow:hidden;\">\n    <div aria-hidden=\"true\" style=\"position:absolute; inset:0; background:radial-gradient(50% 60% at 85% 20%, rgba(244,180,26,.5), transparent 60%); pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative; max-width:880px; margin:0 auto; text-align:center;\">\n      <h2 style=\"font-family:'Zilla Slab', serif; font-weight:300; font-size:clamp(30px,5.5vw,58px); line-height:1.04; margin:0 0 24px;\">Come measure the body with <span style=\"font-weight:700; color:#0E1726;\">us<\u002Fspan>.<\u002Fh2>\n      <p style=\"font-size:clamp(16px,1.7vw,20px); line-height:1.7; max-width:62ch; margin:0 auto 16px; color:#fff5ec;\">We are looking for curiosity-driven researchers — from undergraduates to postdocs — excited by the interface of human physiology, measurement, and mathematical modeling. Strong candidates bring some mix of quantitative modeling (dynamical systems, Bayesian inference, time-series), experimental energetics (indirect/whole-room calorimetry, wearables, thermal imaging), or signal processing.<\u002Fp>\n      <p style=\"font-size:clamp(15px,1.5vw,18px); line-height:1.65; max-width:62ch; margin:0 auto 32px; color:#ffe9d8;\">To apply, send a recent CV, a short summary of past projects, and a brief statement of research interests. <span style=\"opacity:.7;\">⚠ confirm open positions before publishing.<\u002Fspan><\u002Fp>\n      <a href=\"mailto:ice@epfl.ch\" style=\"display:inline-flex; align-items:center; gap:10px; text-decoration:none; font-weight:700; font-size:17px; color:#fff; background:#0E1726; padding:15px 30px; border-radius:999px; box-shadow:0 12px 30px rgba(14,23,38,.35);\" style-hover=\"transform:translateY(-2px); box-shadow:0 18px 40px rgba(14,23,38,.45);\">Get in touch <span aria-hidden=\"true\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background:#0E1726; color:#c3cdda; padding:clamp(54px,7vw,88px) clamp(18px,5vw,72px) 32px;\">\n    <div style=\"max-width:1180px; margin:0 auto; display:flex; gap:clamp(32px,5vw,72px); flex-wrap:wrap; justify-content:space-between;\">\n\n      <div style=\"flex:1 1 280px; min-width:240px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:18px;\">\n          <!-- REPLACE: small decorative lab illustration -->\n          <span aria-hidden=\"true\" style=\"width:46px; height:46px; border-radius:50%; background:radial-gradient(circle at 40% 35%, #F4B41A, #E2711D 45%, #D7263D 78%); box-shadow:0 0 22px rgba(226,113,29,.6); flex:none;\"><\u002Fspan>\n          <span style=\"font-family:'Zilla Slab', serif; font-weight:700; font-size:26px; letter-spacing:.06em; color:#F7F4EC;\">ICE<span style=\"font-weight:300;\"> LAB<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:14px; line-height:1.7; max-width:34ch; margin:0 0 18px;\">Personal
